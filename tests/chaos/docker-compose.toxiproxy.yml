services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0@sha256:9378ed52a28bc50edc1350f936f518f31fa95f0d15917d6eb40b8e376d1a214e
    ports:
      - "${TOXIPROXY_BIND:-127.0.0.1}:8474:8474"
      - "${TOXIPROXY_BIND:-127.0.0.1}:15432:15432"
      - "${TOXIPROXY_BIND:-127.0.0.1}:16379:16379"

  postgres:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    environment:
      POSTGRES_DB: sing_box_next
      POSTGRES_USER: sing_box_next
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for chaos test}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:5432:5432"

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"
